<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danatoto Chat</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * { font-family: 'Inter', sans-serif; }
  body { background: #0a0a0c; color: #e4e4e7; margin: 0; overflow: hidden; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
  
  .glass { background: rgba(20, 20, 23, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
  .neon-border { box-shadow: 0 0 10px rgba(34, 197, 94, 0.3), 0 0 20px rgba(34, 197, 94, 0.1); }
  
  .input-style { background: #131316; border: 1px solid #27272a; color: #fff; transition: all 0.3s; }
  .input-style:focus { border-color: #22c55e; outline: none; box-shadow: 0 0 0 4px rgba(34,197,94,0.1), 0 0 15px rgba(34,197,94,0.2); }
  
  .group-item { transition: all 0.2s; border-left: 3px solid transparent; }
  .group-item:hover { background: rgba(255,255,255,0.03); }
  .group-item.active { background: linear-gradient(90deg, rgba(34,197,94,0.15) 0%, transparent 100%); border-left-color: #22c55e; box-shadow: inset 0 0 20px rgba(34,197,94,0.05); }
  
  @keyframes msgIn { from { opacity: 0; transform: translateY(12px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .msg-in { animation: msgIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
  
  @keyframes glowPulse { 0%, 100% { box-shadow: 0 0 20px rgba(34,197,94,0.3), 0 0 40px rgba(34,197,94,0.1); } 50% { box-shadow: 0 0 30px rgba(34,197,94,0.5), 0 0 60px rgba(34,197,94,0.2); } }
  .logo-glow { animation: glowPulse 3s infinite ease-in-out; }
  
  .modal-bg { background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
  .btn-primary { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); color: #000; font-weight: 700; transition: all 0.2s; box-shadow: 0 4px 15px rgba(34,197,94,0.2); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 25px rgba(34,197,94,0.4); }
  .btn-primary:disabled { background: #27272a; color: #52525b; box-shadow: none; transform: none; }
  .btn-secondary { background: #27272a; color: #fff; transition: all 0.2s; }
  .btn-secondary:hover { background: #3f3f46; }
  .btn-danger { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); color: #fff; font-weight: 700; transition: all 0.2s; }
  .btn-danger:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(239,68,68,0.3); }

  .msg-group { position: relative; }
  .reaction-picker { 
    position: absolute; bottom: -15px; background: #18181b; border: 1px solid #52525b; 
    border-radius: 20px; padding: 4px 6px; display: flex; gap: 4px; z-index: 10; 
    opacity: 0; pointer-events: none; transition: opacity 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }
  .msg-group:hover .reaction-picker { opacity: 1; pointer-events: auto; }
  .reaction-picker button { font-size: 18px; padding: 2px 4px; border-radius: 50%; transition: transform 0.1s; background: transparent; border: none; cursor: pointer; }
  .reaction-picker button:hover { transform: scale(1.3); background: #3f3f46; }
  
  .reaction-pill { background: #18181b; border: 1px solid #3f3f46; font-size: 12px; padding: 2px 8px; border-radius: 12px; display: inline-flex; align-items: center; gap: 4px; cursor: pointer; margin-top: 4px; color: #a1a1aa; }
  .reaction-pill:hover { border-color: #fff; }
  .reaction-pill.active { background: #22c55e; border-color: #22c55e; color: #000; font-weight: bold; }

  .chat-img { max-width: 220px; max-height: 220px; border-radius: 12px; cursor: pointer; transition: transform 0.2s; }
  .chat-img:hover { transform: scale(1.02); }
  .highlight { background: rgba(251,191,36,0.3); color: #fbbf24; padding: 1px 3px; border-radius: 3px; }
  
  .login-bg {
    background: radial-gradient(circle at 50% 50%, rgba(34,197,94,0.15) 0%, transparent 60%),
                radial-gradient(circle at 80% 20%, rgba(59,130,246,0.1) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(168,85,247,0.1) 0%, transparent 50%),
                #0a0a0c;
  }
  .gif-item img { width: 100%; height: 80px; object-fit: cover; border-radius: 4px; cursor: pointer; transition: transform 0.1s; }
  .gif-item img:hover { transform: scale(1.05); }
  
  .action-btn { z-index: 5; position: relative; pointer-events: auto; }
</style>
</head>
<body class="h-screen flex flex-col">

  <div id="loginView" class="h-screen flex items-center justify-center relative login-bg">
    <div class="absolute inset-0 opacity-5" style="background-image: radial-gradient(#888 1px, transparent 1px); background-size: 24px 24px;"></div>
    <div class="relative w-full max-w-md mx-4">

        <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-green-400 to-emerald-600 bg-clip-text text-transparent">DANATOTO CHAT</h1>
        <p class="text-gray-500 text-sm mt-2 tracking-widest uppercase">Enterprise Communication</p>
      </div>
      <div class="glass rounded-2xl p-8 shadow-2xl neon-border">

            <label class="text-xs text-gray-400 ml-1 mb-1 block">Username</label>
            <input type="text" id="loginUsername" class="input-style w-full px-4 py-3 rounded-lg" placeholder="Masukkan username" required>
          </div>
          <div>
            <label class="text-xs text-gray-400 ml-1 mb-1 block">Password</label>
            <input type="password" id="loginPassword" class="input-style w-full px-4 py-3 rounded-lg" placeholder="Masukkan password" required>
          </div>
          <div id="loginError" class="hidden text-xs text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg p-3 flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i><span id="loginErrorMsg">Password salah!</span>
          </div>
          <button type="submit" id="loginBtn" class="btn-primary w-full py-3 rounded-lg flex items-center justify-center gap-2"><i class="fas fa-sign-in-alt"></i> MASUK</button>
        </form>
        <div class="mt-6 text-xs text-gray-500 text-center border-t border-[#27272a] pt-4 flex items-center justify-center gap-2">

  </div>

  <div id="dashboardView" class="hidden h-screen flex flex-col">
    <header class="glass border-b border-[#27272a] px-4 py-2.5 flex items-center justify-between flex-shrink-0 z-20">
      <div class="flex items-center gap-3">
        <img src="https://lh3.googleusercontent.com/d/1JxvqFXKhF56O6ww8YTn-8iV3byNHvyu2" class="w-9 h-9 rounded-lg object-cover">
        <span class="font-bold text-sm tracking-wide hidden md:block text-green-400">DANATOTO CHAT</span>
      </div>
      <div class="flex-1 max-w-xs mx-4 hidden md:block">
        <div class="relative">
          <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-600 text-xs"></i>
          <input type="text" id="globalSearch" class="input-style w-full pl-8 pr-4 py-2 rounded-lg text-xs" placeholder="Cari chat... (Ctrl+F)">

      </div>

        <button id="logoutBtn" class="w-9 h-9 rounded-lg hover:bg-red-500/10 text-gray-500 hover:text-red-400 flex items-center justify-center transition-all"><i class="fas fa-sign-out-alt text-sm"></i></button>

        <div id="adminPanel" class="hidden p-3 border-t border-[#27272a]">

            <button type="button" id="uploadImgBtn" class="w-11 h-11 rounded-xl bg-[#18181b] hover:bg-[#27272a] text-gray-500 hover:text-green-400 flex items-center justify-center flex-shrink-0 transition-all" disabled><i class="fas fa-image"></i></button>

  <div id="profileModal" class="hidden fixed inset-0 modal-bg z-50 flex items-center justify-center p-4">

      <input type="file" id="profileInput" class="hidden" accept="image/*">
      <button onclick="document.getElementById('profileInput').click()" class="btn-secondary px-4 py-2.5 rounded-lg text-sm mb-4 w-full"><i class="fas fa-upload mr-2"></i> Pilih Foto Baru</button>
      <div class="flex gap-2 mt-4">
        <button onclick="closeModal('profileModal')" class="btn-secondary w-full py-2.5 rounded-lg text-sm">Batal</button>
        <button onclick="saveProfilePic()" class="btn-primary w-full py-2.5 rounded-lg text-sm">Simpan</button>
      </div>
    </div>
  </div>

  <div id="manageUsersModal" class="hidden fixed inset-0 modal-bg z-50 flex items-center justify-center p-4">
    <div class="glass rounded-2xl w-full max-w-2xl max-h-[85vh] flex flex-col neon-border">
      <div class="p-5 border-b border-[#27272a] flex items-center justify-between">
        <h3 class="font-bold text-lg">Kelola User & Group</h3>
        <button onclick="closeModal('manageUsersModal')" class="text-gray-500 hover:text-white w-8 h-8 flex items-center justify-center rounded-lg hover:bg-[#27272a]"><i class="fas fa-times"></i></button>
      </div>
      <div class="p-5 overflow-y-auto">

              <input type="password" id="newUserPassword" class="input-style w-full px-3 py-2.5 rounded-lg text-xs" placeholder="Password">

            </div>
          </div>
          <div class="bg-[#0a0a0c] p-4 rounded-xl border border-[#27272a]">

            <div class="space-y-3">
              <div class="flex items-center gap-3">
                <img id="newGroupLogoPreview" src="https://ui-avatars.com/api/?background=27272a&color=fff&name=G" class="w-14 h-14 rounded-xl object-cover cursor-pointer">
                <div class="flex-1">
                  <input type="text" id="newGroupName" class="input-style w-full px-3 py-2.5 rounded-lg text-xs mb-2" placeholder="Nama Group">
                  <input type="file" id="newGroupLogoInput" class="hidden" accept="image/*">

  <div id="manageGroupModal" class="hidden fixed inset-0 modal-bg z-50 flex items-center justify-center p-4">

        <button onclick="closeModal('manageGroupModal')" class="text-gray-500 hover:text-white w-8 h-8 flex items-center justify-center rounded-lg hover:bg-[#27272a]"><i class="fas fa-times"></i></button>
      </div>
      <div class="p-5 overflow-y-auto">
        <div class="flex items-center gap-4 mb-4">
          <img id="editGroupLogoPreview" src="" class="w-20 h-20 rounded-xl object-cover cursor-pointer ring-2 ring-[#27272a]" onclick="document.getElementById('editGroupLogoInput').click()">
          <input type="file" id="editGroupLogoInput" class="hidden" accept="image/*">
          <div class="flex-1 space-y-3">
            <input type="text" id="editGroupName" class="input-style w-full px-4 py-2.5 rounded-lg text-sm" placeholder="Nama Group">

          </div>
        </div>

  <div id="toastContainer" class="fixed top-4 right-4 z-[70] space-y-2"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycby3TVAZ_350S6dfV7ZFjO9uSmNYquHNVi-H4YZ0qgYlBqobpU8yKeb2etZMKGuKm406/exec';

let currentIP = 'Memuat...';
fetch('https://api.ipify.org?format=json')
  .then(res => res.json())
  .then(data => { currentIP = data.ip; document.getElementById('ipDisplay').textContent = currentIP; })
  .catch(() => { currentIP = 'Unknown'; document.getElementById('ipDisplay').textContent = 'Gagal deteksi'; });

let usersCache = [];
let messagesCache = [];
let groupsCache = [];
let lastReadCache = JSON.parse(localStorage.getItem('nc_lastread') || '{}');

let lastRenderedMsgId = null;
let currentGroupLogo = ''; 

// [PERBAIKAN LOGIN] Pastikan Admin selalu ada di cache
function ensureAdminExists() {
  if (!usersCache.find(u => u.username === 'admin')) {
    usersCache.push({ id: '1', name: 'Administrator', username: 'admin', password: 'admin', ip: 'any', role: 'admin', groupAccess: [], avatar: '', pinnedGroups: [] });
    localStorage.setItem('nc_users', JSON.stringify(usersCache));
  }
}

function initApp() {
  fetch(`${API_URL}?action=getUsers`).then(r => r.json()).then(d => {
    usersCache = Array.isArray(d) ? d : [];
    ensureAdminExists();
    localStorage.setItem('nc_users', JSON.stringify(usersCache));
  }).catch(() => {
    usersCache = JSON.parse(localStorage.getItem('nc_users') || '[]');
    ensureAdminExists();
    localStorage.setItem('nc_users', JSON.stringify(usersCache));
  });

  fetch(`${API_URL}?action=getGroups`).then(r => r.json()).then(d => {
    if (Array.isArray(d) && d.length > 0) {
      const uniqueGroups = [];
      const groupIds = new Set();
      d.forEach(g => {
        if (!groupIds.has(g.id)) {
          groupIds.add(g.id);
          uniqueGroups.push(g);
        }
      });
      groupsCache = uniqueGroups;
      localStorage.setItem('nc_groups', JSON.stringify(groupsCache));
    }
  }).catch(() => {});
}
initApp();

async function apiPost(payload) {
  try {
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(payload),
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }
    });
  } catch(e) {}
}

function showToast(msg, type='info') {
  const c = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500';
  const t = document.createElement('div');
  t.className = `${c} text-white text-xs px-4 py-3 rounded-lg shadow-2xl flex items-center gap-2 animate-pulse`;
  t.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 3000);
}

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function formatTime(ts) { return new Date(parseInt(ts)).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }); }
function compressImage(file, maxSize, callback) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      let canvas = document.createElement('canvas');
      let width = img.width, height = img.height;
      if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } }
      else { if (height > maxSize) { width *= maxSize / height; height = maxSize; } }
      canvas.width = width; canvas.height = height;
      let ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      callback(canvas.toDataURL('image/jpeg', 0.6));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function renderMessages(searchTerm = '') {
  const container = document.getElementById('messagesContainer');
  const user = usersCache.find(u => u.id == localStorage.getItem('nc_session'));
  let msgs = messagesCache.filter(m => m.groupId === activeGroupId);
  
  if (searchTerm) {
    const term = searchTerm.toLowerCase();
    msgs = msgs.filter(m => (m.content && !m.content.startsWith('data:image') && m.content.toLowerCase().includes(term)) || m.name.toLowerCase().includes(term));
  }
  
  let html = '';
  let lastDate = '';
  const emojis = ['👍', '❤️', '😂', '😮', '😢', '🙏'];
  
  if (msgs.length === 0) {
    html = `<div class="h-full flex flex-col items-center justify-center text-gray-700"><i class="fas fa-comment-slash text-5xl mb-4"></i><p class="text-sm font-medium">Belum ada pesan. Mulai ngobrol sekarang!</p></div>`;
  } else {
    const renderMsgs = msgs.slice(-100);
    renderMsgs.forEach(msg => {
      const dateStr = new Date(parseInt(msg.timestamp)).toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
      if (dateStr !== lastDate) {
        html += `<div class="flex items-center gap-4 my-6"><div class="flex-1 h-px bg-[#27272a]"></div><span class="text-[10px] text-gray-600 uppercase tracking-wider">${dateStr}</span><div class="flex-1 h-px bg-[#27272a]"></div></div>`;
        lastDate = dateStr;
      }
      const isSelf = msg.userId == user.id;
      const avatar = msg.avatar || `https://ui-avatars.com/api/?background=27272a&color=fff&name=${msg.name}`;
      
      let reactionsHtml = '';
      if (msg.reactions && Object.keys(msg.reactions).length > 0) {
        reactionsHtml = '<div class="flex gap-1 mt-2 flex-wrap">';
        for (const [emoji, uids] of Object.entries(msg.reactions)) {
          const isActive = uids.includes(parseInt(user.id));
          reactionsHtml += `<div class="reaction-pill ${isActive ? 'active' : ''}" onclick="toggleReaction('${msg.id}', '${emoji}')">${emoji} <span>${uids.length}</span></div>`;
        }
        reactionsHtml += '</div>';
      }

      const pickerPos = isSelf ? 'right-0' : 'left-0';
      
      html += `
        <div class="msg-group msg-in flex gap-3 mb-6 ${isSelf ? 'flex-row-reverse' : ''}">
          <img src="${avatar}" class="w-9 h-9 rounded-full flex-shrink-0 object-cover mt-1">
          <div class="max-w-[70%]">
            <div class="flex items-center gap-2 ${isSelf ? 'justify-end' : ''} mb-1">
              <span class="text-xs font-bold ${isSelf ? 'text-green-400' : 'text-white'}">${msg.name}</span>
              <span class="text-[10px] text-gray-600">${formatTime(msg.timestamp)}</span>
            </div>
            <div class="relative">
              ${msg.type === 'image' || msg.type === 'gif' ? 
                `<img src="${msg.content}" class="chat-img" loading="lazy" onclick="viewImage('${msg.content}')">` :
                `<div class="bg-[#18181b] px-4 py-2.5 rounded-2xl text-sm inline-block break-words border border-[#27272a]" style="border-top-left-radius: 2px;">${escapeHtml(msg.content)}</div>`
              }
              <div class="reaction-picker ${pickerPos}">
                ${emojis.map(e => `<button onclick="toggleReaction('${msg.id}', '${e}')">${e}</button>`).join('')}
              </div>
            </div>
            ${reactionsHtml}
          </div>
        </div>`;
    });
  }
  container.innerHTML = html;
  if (!searchTerm) container.scrollTop = container.scrollHeight;
  
  if (searchTerm) {
    const regex = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    container.querySelectorAll('.break-words').forEach(el => {
      el.innerHTML = el.innerHTML.replace(regex, '<span class="highlight">$1</span>');
    });
  }
}

async function toggleReaction(msgId, emoji) {
  const msg = messagesCache.find(m => m.id == msgId);
  if (!msg) return;
  if (!msg.reactions) msg.reactions = {};
  if (!msg.reactions[emoji]) msg.reactions[emoji] = [];
  
  const uid = parseInt(localStorage.getItem('nc_session'));
  const idx = msg.reactions[emoji].indexOf(uid);
  if (idx > -1) { msg.reactions[emoji].splice(idx, 1); if (msg.reactions[emoji].length === 0) delete msg.reactions[emoji]; }
  else { msg.reactions[emoji].push(uid); }
  
  renderMessages(isSearchMode ? document.getElementById('globalSearch').value.trim() : '');
  apiPost({ action: 'updateReactions', id: msgId, reactions: msg.reactions });
}

let pollingInterval = null;
function startNotifCheck() {
  if (pollingInterval) clearInterval(pollingInterval);
  let prevMsgCount = messagesCache.length;
  
  pollingInterval = setInterval(async () => {
    await fetchMessages();
    const user = usersCache.find(u => u.id == localStorage.getItem('nc_session'));
    if(!user) return;
    
    let latestMsg = null, latestGroupId = null;
    groupsCache.forEach(g => {
      if (g.id === activeGroupId) return;
      const msgs = messagesCache.filter(m => m.groupId === g.id);
      const lastRead = lastReadCache[`${user.id}_${g.id}`] || 0;
      const newMsgs = msgs.filter(m => parseInt(m.timestamp) > lastRead);
      if (newMsgs.length > 0) {
        const lastMsg = newMsgs[newMsgs.length - 1];
        if (!latestMsg || parseInt(lastMsg.timestamp) > parseInt(latestMsg.timestamp)) { latestMsg = lastMsg; latestGroupId = g.id; }
      }
    });
    
    const notifBar = document.getElementById('notifBar');
    if (latestMsg) {
      const group = groupsCache.find(g => g.id === latestGroupId);
      document.getElementById('notifText').textContent = `Pesan baru di ${group.name} dari ${latestMsg.name}`;
      notifBar.classList.remove('hidden');
      notifBar.classList.add('flex');
      notifBar.dataset.targetGroup = latestGroupId;
    } else { notifBar.classList.add('hidden'); notifBar.classList.remove('flex'); }
    
    renderGroups();
    if (activeGroupId && messagesCache.length !== prevMsgCount) {
      prevMsgCount = messagesCache.length;
      renderMessages();
    }
  }, 4000);
}

  const role = document.getElementById('newUserRole').value;
  const ip = document.getElementById('newUserIp').value.trim() || 'any';
  if (!name || !username || !password) return showToast('Nama, username, password wajib diisi', 'error');
  
  const newUser = { id: Date.now().toString(), name, username, password, ip, role, groupAccess: [], avatar: '', pinnedGroups: [] };
  usersCache.push(newUser);
  localStorage.setItem('nc_users', JSON.stringify(usersCache));
  
  apiPost({ action: 'addUser', ...newUser });
  
  document.getElementById('newUserName').value = '';
  document.getElementById('newUserUsername').value = '';
  document.getElementById('newUserPassword').value = '';
  renderAdminUserList();
  populateLeaderSelect();
  showToast('User ditambahkan', 'success');
}

function renderAdminUserList() {
  document.getElementById('adminUserList').innerHTML = usersCache.filter(u => u.role !== 'admin').map(u => `
    <div class="bg-[#0a0a0c] p-3 rounded-lg border border-[#27272a] flex items-center justify-between">
      <div>
        <div class="text-sm font-medium">${u.name}</div>
        <div class="text-[10px] text-gray-500">IP: ${u.ip} | Role: <span class="text-green-400 font-bold uppercase">${u.role}</span></div>
      </div>
    </div>
  `).join('') || `<p class="text-xs text-gray-600 text-center py-4">Belum ada user</p>`;
}

let currentEditGroupId = null;
function openManageGroupModal(id) {
  currentEditGroupId = id;
  const g = groupsCache.find(x => x.id === id);
  document.getElementById('editGroupNameTitle').textContent = g.name;
  document.getElementById('editGroupName').value = g.name;
  document.getElementById('editGroupDesc').value = g.desc;
  document.getElementById('editGroupLogoPreview').src = g.logo || `https://ui-avatars.com/api/?background=27272a&color=fff&name=${g.name.substring(0,2)}`;
  currentGroupLogo = g.logo || '';
  renderGroupMembersChecklist(id);
  openModal('manageGroupModal');
}

document.getElementById('editGroupLogoInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  compressImage(file, 300, (src) => {
    currentGroupLogo = src;
    document.getElementById('editGroupLogoPreview').src = src;
  });
});

function renderGroupMembersChecklist(groupId) {
  const g = groupsCache.find(x => x.id === groupId);
  const targetUsers = usersCache.filter(u => u.role !== 'admin');
  
  let activeCount = 0;
  const html = targetUsers.map(u => {
    const hasAccess = u.groupAccess.includes(groupId);
    const isLeader = u.id == g.leaderId;
    if (hasAccess || isLeader) activeCount++;
    return `
      <label class="flex items-center gap-2 p-2 hover:bg-[#18181b] rounded-lg cursor-pointer">
        <input type="checkbox" class="member-cb accent-green-500 w-4 h-4" data-uid="${u.id}" ${hasAccess ? 'checked' : ''} ${isLeader ? 'disabled' : ''} onchange="toggleMemberAccess('${u.id}', '${groupId}')">
        <span class="text-sm flex-1">${u.name}</span>
        ${isLeader ? '<span class="text-[10px] text-green-400 bg-green-500/10 px-2 py-1 rounded">Leader</span>' : ''}
      </label>`;
  }).join('');
  
  document.getElementById('groupMembersList').innerHTML = html || '<p class="text-xs text-gray-600 text-center py-4">Belum ada user</p>';
  document.getElementById('memberCountDisplay').textContent = `${activeCount} Anggota`;
  
  const selectableUsers = targetUsers.filter(u => u.id != g.leaderId);
  const checkedCount = selectableUsers.filter(u => u.groupAccess.includes(groupId)).length;
  const selectAllCb = document.getElementById('selectAllMembers');
  selectAllCb.checked = selectableUsers.length > 0 && checkedCount === selectableUsers.length;
}

async function toggleAllMembers(masterCheckbox) {
  const isChecked = masterCheckbox.checked;
  const gid = currentEditGroupId;
  const g = groupsCache.find(x => x.id === gid);
  if (!g) return;
  
  const targetUsers = usersCache.filter(u => u.role !== 'admin' && u.id != g.leaderId);
  
  targetUsers.forEach(u => {
    const hasAccess = u.groupAccess.includes(gid);
    if (isChecked && !hasAccess) {
      u.groupAccess.push(gid);
      apiPost({ action: 'updateUserAccess', id: u.id, groupAccess: u.groupAccess, avatar: u.avatar, pinnedGroups: u.pinnedGroups || [] });
    } else if (!isChecked && hasAccess) {
      u.groupAccess = u.groupAccess.filter(id => id !== gid);
      apiPost({ action: 'updateUserAccess', id: u.id, groupAccess: u.groupAccess, avatar: u.avatar, pinnedGroups: u.pinnedGroups || [] });
    }
  });
  
  localStorage.setItem('nc_users', JSON.stringify(usersCache));
  renderGroupMembersChecklist(gid);
  renderGroups();
  showToast(isChecked ? 'Semua user ditambahkan' : 'Semua user dikeluarkan', 'success');
}

async function toggleMemberAccess(uid, gid) {
  const u = usersCache.find(x => x.id == uid);
  if (u) {
    if (u.groupAccess.includes(gid)) { u.groupAccess = u.groupAccess.filter(id => id !== gid); showToast(`${u.name} dikeluarkan`, 'info'); }
    else { u.groupAccess.push(gid); showToast(`${u.name} ditambahkan`, 'success'); }
    localStorage.setItem('nc_users', JSON.stringify(usersCache));
    
    renderGroupMembersChecklist(gid);
    renderGroups();
    apiPost({ action: 'updateUserAccess', id: u.id, groupAccess: u.groupAccess, avatar: u.avatar, pinnedGroups: u.pinnedGroups || [] });
  }
}

function saveGroupChanges() {
  const g = groupsCache.find(x => x.id === currentEditGroupId);
  g.name = document.getElementById('editGroupName').value.toUpperCase();
  g.desc = document.getElementById('editGroupDesc').value;
  g.logo = currentGroupLogo;
  localStorage.setItem('nc_groups', JSON.stringify(groupsCache));
  closeModal('manageGroupModal');
  renderGroups();
  if (activeGroupId === currentEditGroupId) updateChatHeader();
  apiPost({ action: 'updateGroup', id: g.id, name: g.name, desc: g.desc, logo: g.logo });
  showToast('Perubahan disimpan', 'success');
}

async function adminDeleteGroup() {
  if (!currentEditGroupId) return;
  if (!confirm('Yakin hapus group ini? Semua pesan di group ini akan tetap tersimpan tapi group hilang dari daftar.')) return;
  
  const gid = currentEditGroupId;
  groupsCache = groupsCache.filter(g => g.id !== gid);
  localStorage.setItem('nc_groups', JSON.stringify(groupsCache));
  
  usersCache.forEach(u => {
    if (u.groupAccess.includes(gid)) {
      u.groupAccess = u.groupAccess.filter(id => id !== gid);
      apiPost({ action: 'updateUserAccess', id: u.id, groupAccess: u.groupAccess, avatar: u.avatar, pinnedGroups: u.pinnedGroups || [] });
    }
  });
  localStorage.setItem('nc_users', JSON.stringify(usersCache));
  
  apiPost({ action: 'deleteGroup', id: gid });
  closeModal('manageGroupModal');
  
  if (activeGroupId === gid) {
    activeGroupId = null;
    document.getElementById('chatHeader').innerHTML = '';
    document.getElementById('messagesContainer').innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-700"><i class="fas fa-comment-slash text-5xl mb-4"></i><p class="text-sm font-medium">Pilih group untuk mulai ngobrol</p></div>`;
    document.getElementById('messageInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('uploadImgBtn').disabled = true;
    document.getElementById('pickerBtn').disabled = true;
  }
  
  renderGroups();
  showToast('Group berhasil dihapus', 'success');
}

async function checkSession() {
  if (localStorage.getItem('nc_session')) {
    usersCache = JSON.parse(localStorage.getItem('nc_users') || '[]');
    ensureAdminExists();
    
    groupsCache = JSON.parse(localStorage.getItem('nc_groups') || '[]');
    messagesCache = JSON.parse(localStorage.getItem('nc_messages') || '[]');
    
    let user = usersCache.find(u => u.id == localStorage.getItem('nc_session'));
    
    if (!user) {
      try {
        const res = await fetch(`${API_URL}?action=getUsers`);
        const d = await res.json();
        usersCache = Array.isArray(d) ? d : [];
        ensureAdminExists();
        if (usersCache.length > 0) localStorage.setItem('nc_users', JSON.stringify(usersCache));
        user = usersCache.find(u => u.id == localStorage.getItem('nc_session'));
      } catch(e) {}
    }
    
    if (user) {
      showDashboard();
    } else {
      localStorage.removeItem('nc_session');
    }
  }
}
checkSession();
</script>
</body>
</html>
