<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusChat Enterprise</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * { font-family: 'Inter', sans-serif; }
  body { background: #18181b; color: #e4e4e7; margin: 0; overflow: hidden; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
  .input-bg { background: #27272a; border: 1px solid #3f3f46; }
  .input-bg:focus { border-color: #22c55e; outline: none; box-shadow: 0 0 0 2px rgba(34,197,94,0.2); }
  .group-item { transition: all 0.15s; border-left: 3px solid transparent; }
  .group-item:hover { background: #27272a; }
  .group-item.active { background: #27272a; border-left-color: #22c55e; }
  @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg-in { animation: msgIn 0.2s ease-out; }
  ::selection { background: rgba(34,197,94,0.3); }
</style>
</head>
<body class="h-screen flex flex-col">

  <!-- LOGIN VIEW -->
  <div id="loginView" class="h-screen flex items-center justify-center relative">
    <div class="absolute inset-0 opacity-5" style="background-image: radial-gradient(#888 1px, transparent 1px); background-size: 20px 20px;"></div>
    <div class="relative w-full max-w-md mx-4">
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-green-500 mb-3">
          <i class="fas fa-comments text-2xl text-black"></i>
        </div>
        <h1 class="text-2xl font-bold">NexusChat</h1>
        <p class="text-sm text-gray-500">Sistem Komunikasi Internal</p>
      </div>
      <div class="bg-[#1f1f23] border border-[#3f3f46] rounded-xl p-8 shadow-2xl">
        <div id="ipDisplay" class="mb-4 text-xs text-gray-400 bg-[#18181b] p-3 rounded-lg border border-[#3f3f46] flex items-center gap-2">
          <i class="fas fa-network-wired text-green-500"></i>
          <span>Memuat IP Perangkat...</span>
        </div>
        <form id="loginForm" class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1.5">Username</label>
            <input type="text" id="loginUsername" class="input-bg w-full px-4 py-2.5 rounded-lg text-white" placeholder="Masukkan username" required>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1.5">Password</label>
            <input type="password" id="loginPassword" class="input-bg w-full px-4 py-2.5 rounded-lg text-white" placeholder="Masukkan password" required>
          </div>
          <div id="loginError" class="hidden text-xs text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg p-3 flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i>
            <span id="loginErrorMsg">Password salah!</span>
          </div>
          <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-black font-bold py-2.5 rounded-lg transition flex items-center justify-center gap-2">
            <i class="fas fa-sign-in-alt"></i> Masuk
          </button>
        </form>
        <div class="mt-4 text-xs text-gray-600 text-center border-t border-[#3f3f46] pt-4">
          <p>Demo Admin: <span class="text-gray-400 font-mono">admin / admin</span></p>
        </div>
      </div>
    </div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="dashboardView" class="hidden h-screen flex flex-col">
    <header class="bg-[#1f1f23] border-b border-[#3f3f46] px-4 py-2 flex items-center justify-between z-20">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-green-500 flex items-center justify-center">
          <i class="fas fa-comments text-black text-sm"></i>
        </div>
        <span class="font-bold">NexusChat</span>
      </div>
      <div class="flex-1 max-w-xs mx-4">
        <div class="relative">
          <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-xs"></i>
          <input type="text" id="globalSearch" class="input-bg w-full pl-8 pr-4 py-1.5 rounded-md text-xs text-white" placeholder="Cari chat... (Ctrl+F)">
        </div>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-xs text-gray-400">IP: <span id="userIpDisplay" class="font-mono text-green-400">-</span></span>
        <div class="w-px h-6 bg-[#3f3f46]"></div>
        <div class="text-right">
          <div class="text-xs font-bold" id="userName">-</div>
          <div class="text-[10px] text-gray-500" id="userRole">-</div>
        </div>
        <button id="logoutBtn" class="w-8 h-8 rounded-md hover:bg-red-500/20 text-gray-400 hover:text-red-400 flex items-center justify-center">
          <i class="fas fa-sign-out-alt text-xs"></i>
        </button>
      </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
      <aside class="w-60 bg-[#1f1f23] border-r border-[#3f3f46] flex flex-col flex-shrink-0">
        <div class="p-3 border-b border-[#3f3f46] flex items-center justify-between">
          <span class="text-[10px] font-bold uppercase tracking-wider text-gray-400">Groups</span>
          <button id="adminAddGroupBtn" class="hidden text-green-400 hover:text-white text-xs" title="Buat Group Baru">
            <i class="fas fa-plus"></i>
          </button>
        </div>
        <div id="groupList" class="flex-1 overflow-y-auto py-2"></div>
        <div id="adminPanel" class="hidden p-3 border-t border-[#3f3f46]">
          <button id="adminManageUsersBtn" class="w-full text-xs text-left text-gray-400 hover:text-white bg-[#27272a] hover:bg-[#3f3f46] py-2 px-3 rounded-md flex items-center gap-2">
            <i class="fas fa-users-cog"></i> Kelola User & IP
          </button>
        </div>
      </aside>

      <main class="flex-1 flex flex-col min-w-0 relative">
        <div id="chatHeader" class="bg-[#1f1f23] border-b border-[#3f3f46] px-6 py-3 flex items-center justify-between flex-shrink-0">
          <div>
            <h2 id="activeGroupName" class="font-bold text-sm">Pilih Group</h2>
            <p id="activeGroupDesc" class="text-xs text-gray-500">-</p>
          </div>
        </div>
        <div id="messagesContainer" class="flex-1 overflow-y-auto px-6 py-4 bg-[#18181b]"></div>
        <div class="bg-[#1f1f23] border-t border-[#3f3f46] p-4 flex-shrink-0">
          <form id="messageForm" class="flex items-center gap-2">
            <input type="text" id="messageInput" class="input-bg flex-1 px-4 py-2.5 rounded-lg text-sm text-white" placeholder="Ketik pesan..." disabled>
            <button type="submit" id="sendBtn" class="bg-green-500 hover:bg-green-600 text-black font-bold px-4 py-2.5 rounded-lg text-sm" disabled>
              <i class="fas fa-paper-plane"></i>
            </button>
          </form>
        </div>
        <div id="notifBar" class="absolute bottom-20 left-1/2 -translate-x-1/2 hidden bg-[#27272a] border border-green-500 rounded-full shadow-2xl px-5 py-2.5 flex items-center gap-3 cursor-pointer z-10" onclick="handleNotifClick()">
          <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
          <span id="notifText" class="text-xs font-medium text-white"></span>
          <i class="fas fa-chevron-right text-xs text-gray-400"></i>
        </div>
      </main>
    </div>
  </div>

  <!-- MODAL ADMIN -->
  <div id="manageUsersModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-[#1f1f23] border border-[#3f3f46] rounded-xl w-full max-w-2xl max-h-[80vh] flex flex-col">
      <div class="p-4 border-b border-[#3f3f46] flex items-center justify-between">
        <h3 class="font-bold">Kelola User, IP & Akses Group</h3>
        <button onclick="closeModal('manageUsersModal')" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
      </div>
      <div class="p-4 overflow-y-auto">
        <div class="grid grid-cols-2 gap-4">
          <div class="bg-[#18181b] p-4 rounded-lg border border-[#3f3f46]">
            <h4 class="text-xs font-bold uppercase mb-3 text-gray-400">Daftar User Baru</h4>
            <div class="space-y-3">
              <input type="text" id="newUserName" class="input-bg w-full px-3 py-2 rounded text-xs text-white" placeholder="Nama Lengkap">
              <input type="text" id="newUserUsername" class="input-bg w-full px-3 py-2 rounded text-xs text-white" placeholder="Username Login">
              <input type="password" id="newUserPassword" class="input-bg w-full px-3 py-2 rounded text-xs text-white" placeholder="Password">
              <input type="text" id="newUserIp" class="input-bg w-full px-3 py-2 rounded text-xs text-white" placeholder="IP Perangkat (cth: 123.45.67.89)" title="Isi 'any' jika bebas IP">
              <button onclick="adminAddUser()" class="bg-green-500 hover:bg-green-600 text-black font-bold w-full py-2 rounded text-xs">Tambah User</button>
            </div>
          </div>
          <div class="bg-[#18181b] p-4 rounded-lg border border-[#3f3f46]">
            <h4 class="text-xs font-bold uppercase mb-3 text-gray-400">Buat Group Baru</h4>
            <div class="space-y-3">
              <input type="text" id="newGroupName" class="input-bg w-full px-3 py-2 rounded text-xs text-white" placeholder="Nama Group (cth: CS Team)">
              <textarea id="newGroupDesc" class="input-bg w-full px-3 py-2 rounded text-xs text-white" rows="2" placeholder="Deskripsi Group"></textarea>
              <button onclick="adminAddGroup()" class="bg-green-500 hover:bg-green-600 text-black font-bold w-full py-2 rounded text-xs">Buat Group</button>
            </div>
          </div>
        </div>
        <div class="mt-6">
          <h4 class="text-xs font-bold uppercase mb-3 text-gray-400">Daftar User & Akses</h4>
          <div id="adminUserList" class="space-y-2 max-h-40 overflow-y-auto"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="manageAccessModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-[#1f1f23] border border-[#3f3f46] rounded-xl w-full max-w-md p-5">
      <h3 class="font-bold mb-2">Atur Akses: <span id="accessUserName" class="text-green-400"></span></h3>
      <p class="text-xs text-gray-500 mb-4">Centang group yang boleh diakses user ini.</p>
      <div id="accessGroupCheckboxes" class="space-y-2 max-h-60 overflow-y-auto"></div>
      <button onclick="closeModal('manageAccessModal')" class="mt-4 w-full bg-[#3f3f46] hover:bg-[#52525b] py-2 rounded text-xs">Tutup</button>
    </div>
  </div>

<script>
let currentIP = 'Memuat...';
fetch('https://api.ipify.org?format=json')
  .then(res => res.json())
  .then(data => {
    currentIP = data.ip;
    document.getElementById('ipDisplay').innerHTML = `<i class="fas fa-network-wired text-green-500"></i> <span>IP Anda: <strong class="text-white font-mono">${currentIP}</strong></span>`;
  })
  .catch(() => { currentIP = 'Unknown'; document.getElementById('ipDisplay').innerHTML = `<i class="fas fa-network-wired text-red-500"></i> <span>Gagal deteksi IP</span>`; });

const DB = {
  init() {
    if (!localStorage.getItem('nc_users')) {
      const admin = [{ id: 1, name: 'Administrator', username: 'admin', password: 'admin', ip: 'any', role: 'admin', groupAccess: [] }];
      localStorage.setItem('nc_users', JSON.stringify(admin));
    }
    if (!localStorage.getItem('nc_groups')) {
      const groups = [
        { id: 'g1', name: 'DISKUSI UMUM', desc: 'Group untuk semua karyawan' },
        { id: 'g2', name: 'KENDALA SISTEM', desc: 'Lapor kendala sistem' }
      ];
      localStorage.setItem('nc_groups', JSON.stringify(groups));
      const users = this.getUsers();
      users[0].groupAccess = ['g1', 'g2'];
      this.saveUsers(users);
    }
    if (!localStorage.getItem('nc_messages')) {
      localStorage.setItem('nc_messages', JSON.stringify([{ id: 'm1', groupId: 'g1', userId: 0, name: 'System', content: 'Selamat datang di NexusChat.', timestamp: Date.now() - 3600000 }]));
    }
    if (!localStorage.getItem('nc_lastread')) localStorage.setItem('nc_lastread', JSON.stringify({}));
  },
  getUsers() { return JSON.parse(localStorage.getItem('nc_users') || '[]'); },
  saveUsers(u) { localStorage.setItem('nc_users', JSON.stringify(u)); },
  getGroups() { return JSON.parse(localStorage.getItem('nc_groups') || '[]'); },
  saveGroups(g) { localStorage.setItem('nc_groups', JSON.stringify(g)); },
  getMessages() { return JSON.parse(localStorage.getItem('nc_messages') || '[]'); },
  addMessage(msg) {
    const msgs = this.getMessages();
    msgs.push(msg);
    if (msgs.length > 10000) msgs.shift();
    localStorage.setItem('nc_messages', JSON.stringify(msgs));
  },
  getLastRead() { return JSON.parse(localStorage.getItem('nc_lastread') || '{}'); },
  setLastRead(gid, uid, ts) {
    const lr = this.getLastRead();
    lr[`${uid}_${gid}`] = ts;
    localStorage.setItem('nc_lastread', JSON.stringify(lr));
  }
};

function showToast(msg, type='info') {
  const c = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500';
  const t = document.createElement('div');
  t.className = `${c} text-white text-xs px-4 py-2 rounded-lg shadow-xl fixed top-4 right-4 z-50 flex items-center gap-2`;
  t.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${msg}`;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 3000);
}

function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function formatTime(ts) { return new Date(ts).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }); }

// AUTH
document.getElementById('loginForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const u = document.getElementById('loginUsername').value.trim();
  const p = document.getElementById('loginPassword').value;
  const errBox = document.getElementById('loginError');
  const errMsg = document.getElementById('loginErrorMsg');
  
  const user = DB.getUsers().find(x => x.username === u);
  if (!user) {
    errMsg.textContent = 'Username tidak ditemukan. Hubungi Admin.';
    errBox.classList.remove('hidden'); return;
  }
  if (user.ip !== 'any' && user.ip !== currentIP) {
    errMsg.textContent = `Akses ditolak! IP Anda (${currentIP}) tidak terdaftar. IP terdaftar: ${user.ip}`;
    errBox.classList.remove('hidden'); return;
  }
  if (user.password !== p) {
    errMsg.textContent = 'Password salah! Silakan coba lagi.';
    errBox.classList.remove('hidden'); return;
  }
  errBox.classList.add('hidden');
  sessionStorage.setItem('nc_session', user.id);
  showDashboard();
});

function showDashboard() {
  document.getElementById('loginView').classList.add('hidden');
  document.getElementById('dashboardView').classList.remove('hidden');
  const user = DB.getUsers().find(u => u.id == sessionStorage.getItem('nc_session'));
  document.getElementById('userName').textContent = user.name;
  document.getElementById('userRole').textContent = user.role.toUpperCase();
  document.getElementById('userIpDisplay').textContent = currentIP;
  if (user.role === 'admin') {
    document.getElementById('adminAddGroupBtn').classList.remove('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
  }
  renderGroups();
  startNotifCheck();
}

document.getElementById('logoutBtn').addEventListener('click', () => { sessionStorage.removeItem('nc_session'); location.reload(); });

// GROUPS & CHAT
let activeGroupId = null;
let isSearchMode = false;

function renderGroups() {
  const user = DB.getUsers().find(u => u.id == sessionStorage.getItem('nc_session'));
  const groups = DB.getGroups();
  const list = document.getElementById('groupList');
  const myGroups = groups.filter(g => user.role === 'admin' || user.groupAccess.includes(g.id));
  
  list.innerHTML = myGroups.map(g => {
    const unread = getUnreadCount(g.id, user.id);
    return `
      <div class="group-item ${activeGroupId === g.id ? 'active' : ''} px-4 py-3 cursor-pointer" onclick="selectGroup('${g.id}')">
        <div class="flex items-center justify-between">
          <span class="text-sm font-medium text-gray-200 truncate flex-1"># ${g.name}</span>
          ${unread > 0 ? `<span class="bg-green-500 text-black font-bold text-[10px] min-w-[18px] h-[18px] rounded-full flex items-center justify-center px-1 ml-2">${unread}</span>` : ''}
        </div>
        <div class="text-[10px] text-gray-500 truncate mt-0.5">${g.desc}</div>
      </div>`;
  }).join('');
}

function getUnreadCount(gid, uid) {
  const msgs = DB.getMessages().filter(m => m.groupId === gid);
  const lastRead = DB.getLastRead()[`${uid}_${gid}`] || 0;
  return msgs.filter(m => m.timestamp > lastRead).length;
}

function selectGroup(id) {
  activeGroupId = id;
  const user = DB.getUsers().find(u => u.id == sessionStorage.getItem('nc_session'));
  DB.setLastRead(id, user.id, Date.now());
  document.getElementById('messageInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('chatHeader').innerHTML = `<div><h2 class="font-bold text-sm">${DB.getGroups().find(g=>g.id===id).name}</h2><p class="text-xs text-gray-500">${DB.getGroups().find(g=>g.id===id).desc}</p></div>`;
  renderGroups();
  renderMessages();
}

function renderMessages(searchTerm = '') {
  const container = document.getElementById('messagesContainer');
  const user = DB.getUsers().find(u => u.id == sessionStorage.getItem('nc_session'));
  let msgs = DB.getMessages().filter(m => m.groupId === activeGroupId);
  
  if (searchTerm) {
    const term = searchTerm.toLowerCase();
    msgs = msgs.filter(m => m.content.toLowerCase().includes(term) || m.name.toLowerCase().includes(term));
  }
  
  let html = '';
  let lastDate = '';
  
  if (msgs.length === 0) {
    html = `<div class="h-full flex flex-col items-center justify-center text-gray-600"><i class="fas fa-comment-slash text-4xl mb-2"></i><p class="text-sm">Belum ada pesan</p></div>`;
  } else {
    msgs.slice(-200).forEach(msg => {
      const dateStr = new Date(msg.timestamp).toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long' });
      if (dateStr !== lastDate) {
        html += `<div class="flex items-center gap-4 my-4"><div class="flex-1 h-px bg-[#3f3f46]"></div><span class="text-[10px] text-gray-500 uppercase">${dateStr}</span><div class="flex-1 h-px bg-[#3f3f46]"></div></div>`;
        lastDate = dateStr;
      }
      const isSelf = msg.userId === user.id;
      if (msg.name === 'System') {
        html += `<div class="text-center my-2"><span class="text-[10px] text-gray-500 bg-[#27272a] px-3 py-1 rounded-full">${msg.content}</span></div>`;
      } else {
        html += `
          <div class="msg-in flex gap-3 mb-4 ${isSelf ? 'flex-row-reverse' : ''}">
            <div class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center text-black font-bold text-xs flex-shrink-0">${msg.name.charAt(0)}</div>
            <div class="max-w-[60%]">
              <div class="flex items-center gap-2 ${isSelf ? 'justify-end' : ''}">
                <span class="text-xs font-bold ${isSelf ? 'text-green-400' : 'text-white'}">${escapeHtml(msg.name)}</span>
                <span class="text-[10px] text-gray-500">${formatTime(msg.timestamp)}</span>
              </div>
              <div class="mt-1 bg-[#27272a] px-3 py-2 rounded-lg text-sm inline-block break-words" style="border-top-left-radius: 0;">${escapeHtml(msg.content)}</div>
            </div>
          </div>`;
      }
    });
  }
  container.innerHTML = html;
  if (!searchTerm) container.scrollTop = container.scrollHeight;
  
  if (searchTerm) {
    const regex = new RegExp(`(${searchTerm.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    container.querySelectorAll('.break-words').forEach(el => {
      el.innerHTML = el.innerHTML.replace(regex, '<span style="background: rgba(251,191,36,0.3); color: #fbbf24; padding: 1px 3px; border-radius: 3px;">$1</span>');
    });
  }
}

document.getElementById('messageForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const input = document.getElementById('messageInput');
  if (!input.value.trim() || !activeGroupId) return;
  const user = DB.getUsers().find(u => u.id == sessionStorage.getItem('nc_session'));
  DB.addMessage({ id: 'm_' + Date.now(), groupId: activeGroupId, userId: user.id, name: user.name, content: input.value.trim(), timestamp: Date.now() });
  input.value = '';
  renderMessages();
  renderGroups();
});

document.getElementById('globalSearch').addEventListener('input', (e) => {
  const val = e.target.value.trim();
  isSearchMode = val.length > 0;
  renderMessages(val);
});

document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    e.preventDefault();
    document.getElementById('globalSearch').focus();
  }
});

// NOTIFIKASI BAWAH
function startNotifCheck() {
  setInterval(() => {
    const user = DB.getUsers().find(u => u.id == sessionStorage.getItem('nc_session'));
    if(!user) return;
    const groups = DB.getGroups().filter(g => user.role === 'admin' || user.groupAccess.includes(g.id));
    let latestMsg = null, latestGroupId = null;
    
    groups.forEach(g => {
      if (g.id === activeGroupId) return;
      const msgs = DB.getMessages().filter(m => m.groupId === g.id);
      const lastRead = DB.getLastRead()[`${user.id}_${g.id}`] || 0;
      const newMsgs = msgs.filter(m => m.timestamp > lastRead);
      if (newMsgs.length > 0) {
        const lastMsg = newMsgs[newMsgs.length - 1];
        if (!latestMsg || lastMsg.timestamp > latestMsg.timestamp) {
          latestMsg = lastMsg; latestGroupId = g.id;
        }
      }
    });
    
    const notifBar = document.getElementById('notifBar');
    if (latestMsg) {
      const group = DB.getGroups().find(g => g.id === latestGroupId);
      document.getElementById('notifText').textContent = `Pesan baru di ${group.name} dari ${latestMsg.name}: "${latestMsg.content.substring(0, 40)}..."`;
      notifBar.classList.remove('hidden');
      notifBar.dataset.targetGroup = latestGroupId;
    } else {
      notifBar.classList.add('hidden');
    }
    renderGroups();
  }, 3000);
}

function handleNotifClick() {
  const target = document.getElementById('notifBar').dataset.targetGroup;
  if (target) selectGroup(target);
  document.getElementById('notifBar').classList.add('hidden');
}

// ADMIN
function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

document.getElementById('adminAddGroupBtn').addEventListener('click', () => openModal('manageUsersModal'));
document.getElementById('adminManageUsersBtn').addEventListener('click', () => { renderAdminUserList(); openModal('manageUsersModal'); });

function adminAddGroup() {
  const name = document.getElementById('newGroupName').value.trim();
  const desc = document.getElementById('newGroupDesc').value.trim();
  if (!name) return showToast('Nama group wajib diisi', 'error');
  const groups = DB.getGroups();
  groups.push({ id: 'g_' + Date.now(), name: name.toUpperCase(), desc: desc || '-' });
  DB.saveGroups(groups);
  document.getElementById('newGroupName').value = '';
  document.getElementById('newGroupDesc').value = '';
  renderGroups();
  showToast('Group berhasil dibuat', 'success');
}

function adminAddUser() {
  const name = document.getElementById('newUserName').value.trim();
  const username = document.getElementById('newUserUsername').value.trim();
  const password = document.getElementById('newUserPassword').value.trim();
  const ip = document.getElementById('newUserIp').value.trim();
  if (!name || !username || !password || !ip) return showToast('Semua field wajib diisi', 'error');
  const users = DB.getUsers();
  if (users.find(u => u.username === username)) return showToast('Username sudah dipakai', 'error');
  users.push({ id: Date.now(), name, username, password, ip, role: 'member', groupAccess: ['g1'] });
  DB.saveUsers(users);
  document.getElementById('newUserName').value = '';
  document.getElementById('newUserUsername').value = '';
  document.getElementById('newUserPassword').value = '';
  document.getElementById('newUserIp').value = '';
  renderAdminUserList();
  showToast('User berhasil ditambahkan', 'success');
}

function renderAdminUserList() {
  const users = DB.getUsers();
  const list = document.getElementById('adminUserList');
  list.innerHTML = users.filter(u => u.role !== 'admin').map(u => `
    <div class="bg-[#18181b] p-3 rounded border border-[#3f3f46] flex items-center justify-between">
      <div>
        <div class="text-sm font-medium">${u.name} <span class="text-[10px] text-gray-500">(${u.username})</span></div>
        <div class="text-[10px] text-gray-500">IP: ${u.ip} | Groups: ${u.groupAccess.length}</div>
      </div>
      <button onclick="openAccessModal(${u.id})" class="text-xs bg-[#3f3f46] hover:bg-[#52525b] px-3 py-1.5 rounded">Atur Akses</button>
    </div>`).join('') || `<p class="text-xs text-gray-500 text-center py-4">Belum ada user</p>`;
}

function openAccessModal(userId) {
  const user = DB.getUsers().find(u => u.id === userId);
  const groups = DB.getGroups();
  document.getElementById('accessUserName').textContent = user.name;
  const container = document.getElementById('accessGroupCheckboxes');
  container.innerHTML = groups.map(g => `
    <label class="flex items-center gap-2 p-2 hover:bg-[#18181b] rounded cursor-pointer">
      <input type="checkbox" class="access-cb accent-green-500" value="${g.id}" ${user.groupAccess.includes(g.id) ? 'checked' : ''}>
      <span class="text-sm">${g.name}</span>
    </label>`).join('');
  
  container.querySelectorAll('.access-cb').forEach(cb => {
    cb.addEventListener('change', () => {
      const users = DB.getUsers();
      const u = users.find(x => x.id === userId);
      if (cb.checked) { if (!u.groupAccess.includes(cb.value)) u.groupAccess.push(cb.value); }
      else { u.groupAccess = u.groupAccess.filter(id => id !== cb.value); }
      DB.saveUsers(users);
      showToast('Akses diperbarui', 'success');
    });
  });
  openModal('manageAccessModal');
}

DB.init();
if (sessionStorage.getItem('nc_session')) showDashboard();
</script>
